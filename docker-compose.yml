name: imedba

# Stack de desarrollo. Una sola Postgres con dos DBs adentro (imedba + keycloak).
# Puertos bindeados a 127.0.0.1 para no exponerlos fuera del host.
# Para prod: `docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d`
# (agrega nginx TLS y cambia Keycloak a modo produccion).

services:
  db:
    image: postgres:16-alpine
    container_name: imedba-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-imedba}
      POSTGRES_USER: ${POSTGRES_USER:-imedba}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-imedba_dev}
      TZ: ${TZ:-America/Argentina/Buenos_Aires}
    volumes:
      - imedba_db_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-imedba}"]
      interval: 5s
      retries: 10
    networks: [imedba-net]

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: imedba-keycloak
    restart: unless-stopped
    command: ["start-dev", "--import-realm"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-imedba}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-imedba_dev}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-localhost}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
      TZ: ${TZ:-America/Argentina/Buenos_Aires}
    volumes:
      - ./keycloak/realms:/opt/keycloak/data/import:ro
    ports:
      - "127.0.0.1:${KEYCLOAK_PORT:-8081}:8080"
    networks: [imedba-net]

  backend:
    build:
      context: ./backend
    image: imedba/backend:dev
    container_name: imedba-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-imedba}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-imedba}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-imedba_dev}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${KEYCLOAK_ISSUER_URI:-http://keycloak:8080/realms/imedba}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: ${KEYCLOAK_JWK_SET_URI:-http://keycloak:8080/realms/imedba/protocol/openid-connect/certs}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-no-reply@imedba.local}
      SENDGRID_FROM_NAME: ${SENDGRID_FROM_NAME:-IMEDBA}
      TZ: ${TZ:-America/Argentina/Buenos_Aires}
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8080}:8080"
    networks: [imedba-net]

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-http://localhost:8081}
        VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-imedba}
        VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-imedba-frontend}
    image: imedba/frontend:dev
    container_name: imedba-frontend
    restart: unless-stopped
    depends_on: [backend]
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-5173}:80"
    networks: [imedba-net]

volumes:
  imedba_db_data:

networks:
  imedba-net:
    driver: bridge
