# nginx interno del contenedor `frontend`: sirve el SPA y nada más.
# El reverse proxy hacia backend/keycloak lo hace el nginx externo (prod) o
# directamente el browser contra los puertos expuestos en dev.

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Logs al stdout/stderr del contenedor
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # Compresión para assets estáticos
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        application/javascript
        application/json
        application/xml
        application/xml+rss
        font/woff2
        image/svg+xml
        text/css
        text/plain
        text/xml;

    # Cache largo para assets con hash en el nombre (Vite los emite así).
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html nunca se cachea para que el deploy llegue rápido al browser.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Endpoint simple para healthcheck del contenedor.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # SPA fallback: cualquier ruta no-asset termina sirviendo index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
