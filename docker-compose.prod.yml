# Override de produccion.
# Uso: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Lo unico que se agrega es nginx con TLS en 80/443 y el ajuste de Keycloak
# para servir bajo /auth con hostname estricto. Los puertos internos siguen
# bindeados a 127.0.0.1 (definidos en el base); nginx llega a los servicios
# por la red interna Docker.

services:
  keycloak:
    command: ["start", "--import-realm", "--optimized"]
    environment:
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME}
      KC_HOSTNAME_STRICT: "true"
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge

  backend:
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${KEYCLOAK_ISSUER_URI}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: ${KEYCLOAK_JWK_SET_URI}
      APP_CORS_ALLOWED_ORIGINS: https://${SERVER_NAME}

  frontend:
    build:
      args:
        VITE_API_BASE_URL: /api
        VITE_KEYCLOAK_URL: /auth
    image: imedba/frontend:prod

  nginx:
    image: nginx:1.27-alpine
    container_name: imedba-nginx
    restart: unless-stopped
    depends_on: [backend, keycloak, frontend]
    environment:
      SERVER_NAME: ${SERVER_NAME}
      NGINX_ENVSUBST_FILTER: "^SERVER_NAME$$"
      TZ: ${TZ:-America/Argentina/Buenos_Aires}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks: [imedba-net]
