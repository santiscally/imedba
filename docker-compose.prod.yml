# Override de producción.
# Uso: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Agrega:
#   - Nginx TLS en 80/443 (frontal)
#   - Keycloak en modo optimized con /auth + hostname estricto
#   - Backend en SPRING_PROFILES_ACTIVE=prod + healthcheck + límites de memoria
#   - Límites de recursos y reservas en todos los servicios.
#
# Los puertos internos siguen bindeados a 127.0.0.1 (definidos en el base);
# nginx llega a los servicios por la red interna Docker.

services:
  db:
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  keycloak:
    command: ["start", "--import-realm", "--optimized"]
    environment:
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME}
      KC_HOSTNAME_STRICT: "true"
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 384M

  backend:
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${KEYCLOAK_ISSUER_URI}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: ${KEYCLOAK_JWK_SET_URI}
      APP_CORS_ALLOWED_ORIGINS: https://${SERVER_NAME}
      JAVA_OPTS: "-XX:MaxRAMPercentage=75 -XX:+ExitOnOutOfMemoryError"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/actuator/health/readiness"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1536M
        reservations:
          memory: 512M

  frontend:
    build:
      args:
        VITE_API_BASE_URL: /api
        VITE_KEYCLOAK_URL: /auth
    image: imedba/frontend:prod
    deploy:
      resources:
        limits:
          memory: 256M

  nginx:
    image: nginx:1.27-alpine
    container_name: imedba-nginx
    restart: unless-stopped
    depends_on: [backend, keycloak, frontend]
    environment:
      SERVER_NAME: ${SERVER_NAME}
      NGINX_ENVSUBST_FILTER: "^SERVER_NAME$$"
      TZ: ${TZ:-America/Argentina/Buenos_Aires}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks: [imedba-net]
    deploy:
      resources:
        limits:
          memory: 128M
